services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: finalayze-db
    environment:
      POSTGRES_USER: finalayze
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: finalayze
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finalayze"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finalayze-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: finalayze-app
    ports:
      - "8000:8000"
    environment:
      FINALAYZE_DATABASE_URL: "postgresql+asyncpg://finalayze:secret@postgres:5432/finalayze"
      FINALAYZE_REDIS_URL: "redis://redis:6379/0"
      FINALAYZE_MODE: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
