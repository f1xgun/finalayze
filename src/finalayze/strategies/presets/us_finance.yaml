segment_id: us_finance
strategies:
  mean_reversion:
    enabled: true
    weight: 0.30
    params:
      bb_period: 20
      bb_std_dev: 2.0
      min_confidence: 0.6
  momentum:
    enabled: true
    weight: 0.25
    params:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      macd_fast: 12
      macd_slow: 26
      min_confidence: 0.6
      lookback_bars: 5
      stop_atr_multiplier: 2.5
      trail_activation_atr: 1.0
      trail_distance_atr: 1.5
      trend_filter: false
      trend_sma_period: 50
      trend_sma_buffer_pct: 2.0
      adx_filter: false
      adx_period: 14
      adx_threshold: 25
      volume_filter: false
      volume_sma_period: 20
      volume_min_ratio: 1.0
      neutral_reset_bars: 20
  event_driven:
    enabled: true
    weight: 0.30
    params:
      min_sentiment: 0.65
      event_types: [interest_rate, earnings, regulatory, macro]
  ml_ensemble:
    enabled: true
    weight: 0.15
    params:
      threshold: 0.15
      min_confidence: 0.5
